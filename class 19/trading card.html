<!DOCTYPE html>
<html>
    <head>
        <title>Hero trading card-css box model</title>
        <style>
body{
    font-family:monospace;
    background-color: palevioletred;
    display:flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
}
.card{
    background-color: plum;
    color: black;
    text-align: center;
    width: 220px;
    padding: 30px;
    border: 5px solid rgb(247, 247, 145);
    margin: 20px;

}
.card h2{
    font-size: 1.3em;
    margin-bottom: 10px;
}
card p{
    font-size: 0.9em;
}
        </style>
    </head>
    <body>
        <div class="card">
            <h2>Thurder Kids</h2>
            <p>Attack:95</p>
            <p>Defeance:72</p>
            <p>Speed:88</p>
            <p>Special:lightning strike</p>
        </div>
    </body>
</html>
